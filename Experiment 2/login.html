<!DOCTYPE html>
<html>
<head>
    <title>HTML Login page</title>
    <link rel="stylesheet" href="cssstyle.css">
</head>
<body>
    <div class="main">
        <h1>Credentials Lab</h1>
        <h3>Enter your credentials in the specific places</h3>
        
        <form action="login.php" method="POST">
            <label for="first">Username:</label>
            <input type="text" id="first" name="username" placeholder="Enter your Username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your Password" required>

            <div class="wrap">
                 <button type="submit" name="login">Submit</button>
            </div>
        </form>

        <p>Not registered? 
            <a href="register.php" style="text-decoration: none;">Create an account</a> 
        </p>
    </div>
</body>
</html>
